<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Ventures</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text: #f5f5f7;
      --secondary: #86868b;
      --bg: #000000;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --card-hover-border: rgba(255,255,255,0.16);
      --accent: #6e56cf;
      --accent-glow: rgba(110,86,207,0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Subtle gradient background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 20%, rgba(110,86,207,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(56,189,248,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header, .grid, footer { position: relative; z-index: 1; }

    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .wordmark {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #f5f5f7 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      font-size: 1.05rem;
      color: var(--secondary);
      font-weight: 400;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 580px;
      width: 100%;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; max-width: 320px; }
      header h1 { font-size: 2rem; }
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 28px 36px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .card:hover {
      border-color: var(--card-hover-border);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(110,86,207,0.1);
    }

    .card-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 20px;
      object-fit: cover;
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .card .platform {
      font-size: 0.8rem;
      color: var(--secondary);
      font-weight: 400;
    }

    footer {
      margin-top: 72px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--secondary);
    }

    footer a {
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--text); }

    .footer-links {
      margin-top: 6px;
    }

    .footer-links span { margin: 0 6px; opacity: 0.4; }
  </style>
</head>
<body>
  <header>
    <p class="wordmark">Silly Ventures</p>
    <h1>We make apps<br>people enjoy.</h1>
    <p class="subtitle">Small studio. Thoughtful software.</p>
  </header>

  <div class="grid">
    <a class="card" href="https://aven.sillyventures.co" target="_blank" rel="noopener">
      <img class="card-icon" src="assets/aven.png" alt="Aven app icon">
      <h2>Aven</h2>
      <span class="platform">iOS + Apple Watch</span>
    </a>
    <a class="card" href="#" rel="noopener">
      <img class="card-icon" src="assets/silly-golf.png" alt="Silly Golf app icon">
      <h2>Silly Golf</h2>
      <span class="platform">Apple Vision Pro</span>
    </a>
  </div>

  <footer>
    <p>&copy; 2026 Silly Ventures LLC</p>
    <div class="footer-links">
      <a href="mailto:support@sillyventures.co">Contact</a>
    </div>
  </footer>
</body>
</html>
