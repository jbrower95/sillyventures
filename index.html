<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Ventures</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text: #1d1d1f;
      --secondary: #86868b;
      --bg: #fbfbfd;
      --card-bg: #ffffff;
      --card-border: rgba(0,0,0,0.06);
      --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
      --card-hover-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f5f5f7;
        --secondary: #86868b;
        --bg: #000000;
        --card-bg: #1c1c1e;
        --card-border: rgba(255,255,255,0.08);
        --card-shadow: 0 2px 12px rgba(0,0,0,0.3);
        --card-hover-shadow: 0 6px 24px rgba(0,0,0,0.5);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    header p {
      font-size: 1.1rem;
      color: var(--secondary);
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 640px;
      width: 100%;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; max-width: 360px; }
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .card:hover {
      box-shadow: var(--card-hover-shadow);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 20px;
      line-height: 1;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .card .platform {
      font-size: 0.85rem;
      color: var(--secondary);
      font-weight: 400;
    }

    footer {
      margin-top: 64px;
      text-align: center;
      color: var(--secondary);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Silly Ventures</h1>
    <p>Apps we're building.</p>
  </header>

  <div class="grid">
    <a class="card" href="https://aven.sillyventures.co" target="_blank" rel="noopener">
      <div class="card-icon">🏋️</div>
      <h2>Aven</h2>
      <span class="platform">iOS + Apple Watch</span>
    </a>
    <a class="card" href="#" target="_blank" rel="noopener">
      <div class="card-icon">⛳</div>
      <h2>Silly Golf</h2>
      <span class="platform">visionOS</span>
    </a>
  </div>

  <footer>
    <p>&copy; 2026 Silly Ventures LLC</p>
  </footer>
</body>
</html>
