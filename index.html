<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Ventures</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      width: 100%;
    }

    /* Logo */
    .logo {
      height: 64px;
      margin-bottom: 72px;
    }

    @media (max-width: 520px) {
      .logo { height: 48px; margin-bottom: 56px; }
    }

    /* App grid */
    .apps {
      display: flex;
      gap: 80px;
      align-items: flex-start;
    }

    @media (max-width: 620px) {
      .apps { flex-direction: column; gap: 56px; align-items: center; }
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #1d1d1f;
      transition: transform 0.25s ease;
    }

    .app:hover { transform: scale(1.03); }

    .app-icon {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      object-fit: cover;
    }

    @media (max-width: 520px) {
      .app-icon { width: 128px; height: 128px; border-radius: 28px; }
    }

    .app-name {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    /* Platform badges */
    .platforms {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .platform-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #86868b;
      letter-spacing: 0.01em;
    }

    .platform-badge svg {
      width: 14px;
      height: 14px;
      fill: #86868b;
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 20px 24px;
      text-align: center;
      font-size: 0.75rem;
      color: #86868b;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    footer a {
      color: #86868b;
      text-decoration: none;
    }

    footer a:hover { color: #1d1d1f; }

    footer span.sep { margin: 0 8px; opacity: 0.4; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/logo.png" alt="Silly Ventures">

    <div class="apps">
      <a class="app" href="https://aven.sillyventures.co" target="_blank" rel="noopener">
        <img class="app-icon" src="assets/aven.png" alt="Aven">
        <span class="app-name">Aven</span>
        <div class="platforms">
          <span class="platform-badge">
            <!-- iPhone -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="1" width="14" height="22" rx="3" ry="3" fill="none" stroke="#86868b" stroke-width="1.8"/><line x1="12" y1="19" x2="12" y2="19.01" stroke="#86868b" stroke-width="2" stroke-linecap="round"/></svg>
            iPhone
          </span>
          <span class="platform-badge">
            <!-- Apple Watch -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="4" width="12" height="16" rx="4" ry="4" fill="none" stroke="#86868b" stroke-width="1.8"/><path d="M9 4V2h6v2M9 20v2h6v-2" fill="none" stroke="#86868b" stroke-width="1.8" stroke-linecap="round"/></svg>
            Apple Watch
          </span>
        </div>
      </a>

      <a class="app" href="https://golf.sillyventures.co" target="_blank" rel="noopener">
        <img class="app-icon" src="assets/silly-golf.png" alt="Silly Golf">
        <span class="app-name">Silly Golf</span>
        <div class="platforms">
          <span class="platform-badge">
            <!-- Vision Pro -->
            <svg viewBox="0 0 28 16" xmlns="http://www.w3.org/2000/svg"><path d="M2 8c0-3.3 5.4-6 12-6s12 2.7 12 6-5.4 6-12 6S2 11.3 2 8z" fill="none" stroke="#86868b" stroke-width="1.6"/><circle cx="10" cy="8" r="2.2" fill="none" stroke="#86868b" stroke-width="1.4"/><circle cx="18" cy="8" r="2.2" fill="none" stroke="#86868b" stroke-width="1.4"/></svg>
            Apple Vision Pro
          </span>
        </div>
      </a>
    </div>
  </main>

  <footer>
    &copy; 2026 Silly Ventures LLC<span class="sep">&middot;</span><a href="mailto:hello@sillyventures.co">hello@sillyventures.co</a>
  </footer>
</body>
</html>
